# Minimal war-room agent profile config. Tokens live in .env, NOT here.
# slack.* / discord.* are runtime/channel config (research: aahil-sh config.yaml:399-421).
slack:
  require_mention: true
  free_response_channels: ''
  allowed_channels: ''
  channel_prompts: {}
discord:
  require_mention: true
  free_response_channels: ''
  allowed_channels: ''
  auto_thread: false
  thread_require_mention: false
  history_backfill: true
  history_backfill_limit: 50
  reactions: false
  channel_prompts: {}
  allow_any_attachment: false
  max_attachment_bytes: 33554432
  reply_to_mode: false
# >>> warroom-managed (set via `warroom setup`) >>>
war_room:
  enabled: false
  board: default
  role: contributor
  min_confidence: 75
  gate_action: abstain
  enforce: false
  show_confidence_badge: true
# <<< warroom-managed <<<
# Cross-agent routing (non-secret). Source of truth for which board this profile
# joins. `warroom setup` / `warroom enroll` rewrite this sentinel-managed block.
# SHIPPED label MUST stay "" — the wizard populates it with your handle in the
# installed <profile>/config.yaml only (a real-name label reveals identity).
# >>> warroom-mailbox >>>
mailbox:
  board: default
  label: ""
  mailbox_home: ""
  socket_path: ""
# <<< warroom-mailbox <<<
# Hermes gateway hooks. MUST be a list-of-mappings (each with a `command` key);
# a scalar string is silently warn-skipped by Hermes (shell_hooks._parse_hooks_block),
# which is why the legacy scalar form never fired. `warroom setup` /
# enroll.bootstrap rewrites this command to an absolute path at install time
# (Hermes does no {{PROFILE_ROOT}} substitution and may run hooks from an
# arbitrary cwd); first_run.sh self-locates via BASH_SOURCE as a backstop.
hooks:
  on_session_start:
    - command: "bash hooks/first_run.sh"
hooks_auto_accept: true   # required for unattended first-run; remove to force consent
plugins:
  enabled: true
# Personality flavors — pick one for the agent's register. Generic starters only;
# add your own. Each has a one-line description and an example system_prompt_suffix.
personalities:
  helpful:
    description: Warm, proactive, and thorough; anticipates the next question.
    system_prompt_suffix: "Be warm and proactive. Anticipate the follow-up and offer the next useful step."
  concise:
    description: Minimal words, maximum signal; no preamble.
    system_prompt_suffix: "Answer in as few words as carry the signal. No preamble, no filler."
  technical:
    description: Precise and jargon-fluent; assumes an expert reader.
    system_prompt_suffix: "Assume an expert reader. Be precise, name mechanisms, skip the basics."
  teacher:
    description: Explains the why, builds from fundamentals, uses examples.
    system_prompt_suffix: "Explain the reasoning. Build from fundamentals and use concrete examples."
  noir:
    description: Terse, atmospheric, hard-boiled narration.
    system_prompt_suffix: "Narrate in a terse, hard-boiled noir register. Short sentences. Dry."
# Per-platform toolset routing. Managed in its own sentinel block (distinct from
# warroom-managed) so future templating can rewrite it cleanly. Toolset names are
# Hermes built-ins; edit the lists to change what each surface can do.
# >>> warroom-toolsets >>>
platform_toolsets:
  cli:
  - browser
  - clarify
  - code_execution
  - computer_use
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - messaging
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
  discord:
  - hermes-discord
  slack:
  - hermes-slack
# <<< warroom-toolsets <<<
# Safe public-template defaults (override deliberately):
# Require manual approval for sensitive actions rather than auto-approving.
approvals:
  mode: manual
# Do not execute scheduled jobs by default; set to "allow" once you add cron jobs.
cron_mode: deny
# Keep the Tirith policy/security engine enabled by default.
security:
  tirith_enabled: true
# Redact secrets from logs and transcript output by default.
redact_secrets: true
